<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TimeTrack</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #00263e; min-height: 100vh; }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-thumb { background: #004d6e; border-radius: 2px; }

    .btn-primary { background:#72ffea; color:#00263e; border:none; border-radius:12px; padding:14px 28px; font-size:15px; font-weight:700; cursor:pointer; transition:all 0.2s; font-family:'DM Sans',sans-serif; }
    .btn-primary:hover { transform:translateY(-1px); box-shadow:0 8px 24px rgba(114,255,234,.4); filter:brightness(1.08); }
    .btn-primary:disabled { opacity:.3; cursor:default; transform:none; box-shadow:none; filter:none; }

    .btn-stop { background:#72ffea; color:#00263e; border:none; border-radius:12px; padding:14px 28px; font-size:15px; font-weight:700; cursor:pointer; transition:all 0.2s; font-family:'DM Sans',sans-serif; }
    .btn-stop:hover { transform:translateY(-1px); box-shadow:0 8px 24px rgba(114,255,234,.4); filter:brightness(1.08); }

    .card { background:rgba(255,255,255,.05); border:1px solid rgba(114,255,234,.1); border-radius:20px; }

    .nav-btn { background:none; border:none; cursor:pointer; padding:8px 16px; border-radius:10px; font-size:13px; font-weight:500; color:rgba(255,255,255,.38); transition:all 0.2s; font-family:'DM Sans',sans-serif; }
    .nav-btn.active { background:rgba(114,255,234,.14); color:#72ffea; }
    .nav-btn:hover:not(.active) { color:rgba(255,255,255,.75); background:rgba(255,255,255,.06); }

    .commessa-chip { padding:8px 16px; border-radius:20px; cursor:pointer; font-size:13px; font-weight:500; border:1px solid rgba(255,255,255,.14); background:transparent; color:rgba(255,255,255,.45); transition:all .15s; font-family:'DM Sans',sans-serif; }
    .commessa-chip.selected { background:rgba(114,255,234,.14); border-color:#72ffea; color:#72ffea; font-weight:600; }
    .commessa-chip:hover:not(.selected) { border-color:rgba(255,255,255,.35); color:rgba(255,255,255,.85); }

    input[type="text"], textarea { background:rgba(255,255,255,.06); border:1px solid rgba(255,255,255,.12); border-radius:12px; color:#fff; padding:12px 16px; font-family:'DM Sans',sans-serif; font-size:14px; outline:none; transition:border .2s; width:100%; }
    input[type="text"]::placeholder, textarea::placeholder { color:rgba(255,255,255,.28); }
    input[type="text"]:focus, textarea:focus { border-color:#72ffea; background:rgba(114,255,234,.05); }
    textarea { resize:none; }

    .timer-display { font-family:'DM Mono',monospace; font-size:52px; font-weight:500; letter-spacing:4px; color:#72ffea; text-shadow:0 0 40px rgba(114,255,234,.45); }

    .entry-row { display:flex; align-items:center; gap:10px; padding:12px 0; border-bottom:1px solid rgba(255,255,255,.06); }
    .entry-row:last-child { border-bottom:none; }

    .badge { padding:3px 10px; border-radius:20px; font-size:12px; font-weight:600; background:rgba(114,255,234,.12); color:#72ffea; white-space:nowrap; border:1px solid rgba(114,255,234,.18); }

    .toast { position:fixed; bottom:30px; left:50%; transform:translateX(-50%); background:#003654; border:1px solid rgba(114,255,234,.4); padding:12px 24px; border-radius:12px; font-size:14px; font-weight:500; color:#72ffea; z-index:1000; box-shadow:0 8px 32px rgba(0,0,0,.5); animation:fadeup .3s ease; white-space:nowrap; }
    @keyframes fadeup { from{opacity:0;transform:translateX(-50%) translateY(10px)}to{opacity:1;transform:translateX(-50%) translateY(0)} }

    .pulse { animation:pulse-anim 1.5s infinite; }
    @keyframes pulse-anim { 0%,100%{opacity:1}50%{opacity:.4} }
    @keyframes spin { from{transform:rotate(0deg)}to{transform:rotate(360deg)} }

    .delete-btn { background:none; border:none; cursor:pointer; color:rgba(255,255,255,.22); font-size:16px; padding:2px 6px; border-radius:6px; transition:all .15s; }
    .delete-btn:hover { color:#ff8080; background:rgba(255,128,128,.1); }

    .avatar { width:36px; height:36px; border-radius:50%; background:#72ffea; display:flex; align-items:center; justify-content:center; font-size:14px; font-weight:700; color:#00263e; flex-shrink:0; cursor:pointer; user-select:none; transition:all .2s; }
    .avatar:hover { box-shadow:0 0 0 3px rgba(114,255,234,.4); }

    .chip { display:inline-flex; align-items:center; gap:6px; padding:6px 14px; border-radius:20px; font-size:13px; font-weight:500; background:rgba(114,255,234,.12); border:1px solid rgba(114,255,234,.28); color:#72ffea; }
    .chip-x { cursor:pointer; opacity:.55; font-size:15px; line-height:1; }
    .chip-x:hover { opacity:1; }

    .step-dot { width:8px; height:8px; border-radius:50%; transition:all 0.3s; display:inline-block; }

    .ob-btn { background:#72ffea; color:#00263e; border:none; border-radius:12px; padding:14px 28px; font-size:16px; font-weight:700; cursor:pointer; transition:all 0.2s; font-family:'DM Sans',sans-serif; width:100%; }
    .ob-btn:hover { transform:translateY(-1px); box-shadow:0 8px 24px rgba(114,255,234,.4); filter:brightness(1.08); }
    .ob-btn:disabled { opacity:.3; cursor:default; transform:none; box-shadow:none; filter:none; }

    .sync-bar { background:rgba(255,120,120,.08); border:1px solid rgba(255,120,120,.28); border-radius:12px; padding:10px 16px; font-size:13px; color:#ff9999; display:flex; align-items:center; gap:8px; cursor:pointer; margin-bottom:12px; }
    .cloud-ok { font-size:11px; color:#72ffea; display:flex; align-items:center; gap:4px; }

    .label-sm { font-size:11px; color:rgba(255,255,255,.32); letter-spacing:1.5px; text-transform:uppercase; margin-bottom:12px; }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">

const DEFAULT_WEBHOOK_URL = "https://defaulta969fcba514d452eb6120b717e8cdf.58.environment.api.powerplatform.com/powerautomate/automations/direct/workflows/446a7e868966410db57ebce64355fa5f/triggers/manual/paths/invoke?api-version=1";
const WEBHOOK_PLACEHOLDER = "Incolla qui l'HTTP POST URL completo del flow Power Automate";

const { useState, useEffect } = React;

const C = {
  accent: "#72ffea",
  bg: "#00263e",
  bgCard: "rgba(255,255,255,.05)",
  white: "#ffffff",
  muted: "rgba(255,255,255,.38)",
  muted2: "rgba(255,255,255,.22)",
  muted3: "rgba(255,255,255,.55)",
  border: "rgba(114,255,234,.1)",
  danger: "#ff8080",
  warn: "#ffdd72",
};

const storage = {
  get: (k) => { try { const v=localStorage.getItem(k); return v?{value:v}:null; } catch { return null; } },
  set: (k,v) => { try { localStorage.setItem(k,v); } catch {} },
  del: (k) => { try { localStorage.removeItem(k); } catch {} },
};

const isCompleteWebhookUrl = url => /^https:\/\/.+\/triggers\/manual\/paths\/invoke\?.+/i.test((url || "").trim());
const isNetworkLikeError = err => /Failed to fetch|NetworkError|Load failed|fetch/i.test(String(err?.message || err || ""));
const getErrorMessage = (err, url) => {
  const msg = String(err?.message || err || "Errore sconosciuto");
  if (!url) return "Configura l'URL del flow nelle Impostazioni.";
  if (!isCompleteWebhookUrl(url)) return "L'URL del flow sembra incompleto. Incolla l'HTTP POST URL completo dal trigger Power Automate.";
  if (/401|403/.test(msg)) return "Il flow richiede autorizzazione oppure l'URL non accetta questa richiesta.";
  if (/404/.test(msg)) return "URL del flow non trovato. Verifica di aver copiato l'HTTP POST URL completo.";
  if (isNetworkLikeError(msg)) return "La richiesta è stata bloccata dal browser o dal flow (CORS/rete). Verifica console browser e configurazione del trigger.";
  return msg;
};

function formatTime(s) {
  const h=Math.floor(s/3600),m=Math.floor((s%3600)/60),sec=s%60;
  return `${String(h).padStart(2,"0")}:${String(m).padStart(2,"0")}:${String(sec).padStart(2,"0")}`;
}
const todayLabel = () => new Date().toLocaleDateString("it-IT",{weekday:"long",year:"numeric",month:"2-digit",day:"2-digit"});
const todayKey = () => new Date().toISOString().slice(0,10);
const toExcelDate = d => d.split("-").reverse().join("/");
const getGiorno = d => new Date(d).toLocaleDateString("it-IT",{weekday:"long"});

// ── Onboarding ──────────────────────────────────────────────────────────────
function Onboarding({ onDone }) {
  const [step,setStep]=useState(1);
  const [nome,setNome]=useState("");
  const [commesse,setCommesse]=useState([]);
  const [input,setInput]=useState("");
  const addC = () => { const v=input.trim(); if(!v||commesse.includes(v))return; setCommesse([...commesse,v]); setInput(""); };

  return (
    <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",fontFamily:"'DM Sans',sans-serif",color:C.white,padding:20}}>
      <div style={{width:"100%",maxWidth:460}}>
        <div style={{textAlign:"center",marginBottom:40}}>
          <div style={{fontSize:40,marginBottom:10}}>⏱</div>
          <div style={{fontSize:11,color:C.muted,letterSpacing:"3px",textTransform:"uppercase"}}>TimeTrack</div>
        </div>
        <div style={{display:"flex",justifyContent:"center",gap:10,marginBottom:32}}>
          {[1,2].map(n=><span key={n} className="step-dot" style={{background:step>=n?C.accent:"rgba(255,255,255,.12)",transform:step===n?"scale(1.6)":"scale(1)"}}/>)}
        </div>
        <div className="card" style={{padding:"36px 32px"}}>
          {step===1 && <>
            <div style={{marginBottom:6,fontSize:24,fontWeight:700}}>👋 Ciao! Come ti chiami?</div>
            <div style={{fontSize:14,color:C.muted,marginBottom:28,lineHeight:1.7}}>Il tuo nome apparirà nel report Excel aziendale.</div>
            <input type="text" placeholder="Es. Mario Rossi" value={nome} onChange={e=>setNome(e.target.value)} onKeyDown={e=>{if(e.key==="Enter"&&nome.trim())setStep(2);}} autoFocus/>
            <div style={{height:16}}/>
            <button className="ob-btn" disabled={!nome.trim()} onClick={()=>setStep(2)}>Continua →</button>
          </>}
          {step===2 && <>
            <div style={{marginBottom:6,fontSize:24,fontWeight:700}}>📌 Quali commesse segui?</div>
            <div style={{fontSize:14,color:C.muted,marginBottom:24,lineHeight:1.7}}>Potrai sempre modificarle nelle impostazioni.</div>
            <div style={{display:"flex",gap:8,marginBottom:14}}>
              <input type="text" placeholder="Es. Progetto Alpha, Cliente Bianchi..." value={input} onChange={e=>setInput(e.target.value)} onKeyDown={e=>{if(e.key==="Enter")addC();}} autoFocus style={{flex:1}}/>
              <button onClick={addC} style={{background:"rgba(114,255,234,.15)",border:"1.5px solid rgba(114,255,234,.3)",borderRadius:12,color:C.accent,cursor:"pointer",padding:"0 18px",fontSize:24,fontFamily:"inherit",transition:"all .2s"}}>+</button>
            </div>
            <div style={{display:"flex",flexWrap:"wrap",gap:8,minHeight:40,marginBottom:24}}>
              {commesse.map(c=><span key={c} className="chip">{c}<span className="chip-x" onClick={()=>setCommesse(commesse.filter(x=>x!==c))}>×</span></span>)}
              {commesse.length===0&&<span style={{fontSize:13,color:C.muted2}}>Nessuna commessa aggiunta ancora...</span>}
            </div>
            <div style={{display:"flex",gap:10}}>
              <button onClick={()=>setStep(1)} style={{background:"none",border:"1px solid rgba(255,255,255,.14)",borderRadius:12,color:C.muted,cursor:"pointer",padding:"14px 20px",fontSize:14,fontFamily:"inherit",transition:"all .2s"}}>← Indietro</button>
              <button className="ob-btn" disabled={commesse.length===0} onClick={()=>onDone(nome.trim(),commesse)} style={{flex:1}}>Inizia ✓</button>
            </div>
          </>}
        </div>
      </div>
    </div>
  );
}

// ── App ─────────────────────────────────────────────────────────────────────
function App() {
  const [ready,setReady]=useState(false);
  const [onboarded,setOnboarded]=useState(false);
  const [commesse,setCommesse]=useState([]);
  const [entries,setEntries]=useState([]);
  const [active,setActive]=useState(null);
  const [tick,setTick]=useState(0);
  const [desc,setDesc]=useState("");
  const [sel,setSel]=useState("");
  const [view,setView]=useState("track");
  const [newC,setNewC]=useState("");
  const [nome,setNome]=useState("");
  const [toast,setToast]=useState(null);
  const [editN,setEditN]=useState(false);
  const [editNVal,setEditNVal]=useState("");
  const [sync,setSync]=useState({});
  const [webhookUrl,setWebhookUrl]=useState(DEFAULT_WEBHOOK_URL);
  const [webhookDraft,setWebhookDraft]=useState(DEFAULT_WEBHOOK_URL);
  const [lastSyncError,setLastSyncError]=useState("");
  const [testingWebhook,setTestingWebhook]=useState(false);

  useEffect(()=>{
    const e=storage.get("tt-entries"); if(e)setEntries(JSON.parse(e.value));
    const c=storage.get("tt-commesse"); if(c){const a=JSON.parse(c.value);setCommesse(a);setSel(a[0]||"");}
    const n=storage.get("tt-nome"); if(n){setNome(n.value);setOnboarded(true);}
    const w=storage.get("tt-webhook-url"); const url=(w?.value || DEFAULT_WEBHOOK_URL).trim();
    setWebhookUrl(url); setWebhookDraft(url);
    setReady(true);
  },[]);

  useEffect(()=>{
    if(!active||!active.startTs)return;
    const id=setInterval(()=>setTick(t=>t+1),1000);
    return()=>clearInterval(id);
  },[active]);

  const elapsed = active?(active.startTs?Math.floor((Date.now()-active.startTs)/1000)+active.elapsed:active.elapsed):0;

  const showToast = (msg,dur=2500) => { setToast(msg); setTimeout(()=>setToast(null),dur); };
  const saveE = next => { setEntries(next); storage.set("tt-entries",JSON.stringify(next)); };
  const saveC = next => { setCommesse(next); if(!next.includes(sel))setSel(next[0]||""); storage.set("tt-commesse",JSON.stringify(next)); };

  const saveWebhook = () => {
    const url = webhookDraft.trim();
    setWebhookUrl(url);
    storage.set("tt-webhook-url", url);
    showToast(isCompleteWebhookUrl(url) ? "✓ URL flow salvato" : "⚠ URL salvato, ma sembra incompleto", 3000);
  };

  const resetWebhook = () => {
    setWebhookUrl(DEFAULT_WEBHOOK_URL);
    setWebhookDraft(DEFAULT_WEBHOOK_URL);
    storage.set("tt-webhook-url", DEFAULT_WEBHOOK_URL);
    setLastSyncError("");
    showToast("✓ URL flow ripristinato", 2500);
  };

  const handleDone = (n,c) => { setNome(n);setCommesse(c);setSel(c[0]);setOnboarded(true);storage.set("tt-nome",n);storage.set("tt-commesse",JSON.stringify(c)); };

  async function postToWebhook(url, payload, useCompatibilityMode=false) {
    const options = {
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify(payload)
    };
    if (useCompatibilityMode) options.mode = "no-cors";

    const response = await fetch(url, options);

    if (useCompatibilityMode) {
      return { ok:true, compatibility:true, detail:"Richiesta inviata in modalita compatibilita (no-cors)." };
    }

    const raw = await response.text().catch(()=>"");
    let data = raw;
    try { data = raw ? JSON.parse(raw) : null; } catch {}

    if (!response.ok) {
      throw new Error(typeof data === "string" && data ? data : `HTTP ${response.status}`);
    }

    return { ok:true, compatibility:false, detail:data || raw || `HTTP ${response.status}` };
  }

  async function sendOD(entry) {
    const url = webhookUrl.trim();
    const p={giorno:getGiorno(entry.date),data:toExcelDate(entry.date),dipendente:entry.nome,commessa:entry.commessa,ore:Math.floor(entry.seconds/3600),minuti:Math.floor((entry.seconds%3600)/60),tempo:formatTime(entry.seconds),descrizione:entry.desc};
    setSync(s=>({...s,[entry.id]:"pending"}));
    setLastSyncError("");

    if (!url) {
      const msg = "Configura l'URL del flow nelle Impostazioni.";
      setSync(s=>({...s,[entry.id]:"error"}));
      setLastSyncError(msg);
      return { ok:false, message:msg };
    }

    if (!isCompleteWebhookUrl(url)) {
      const msg = "L'URL del flow sembra incompleto. Incolla l'HTTP POST URL completo del trigger Power Automate.";
      setSync(s=>({...s,[entry.id]:"error"}));
      setLastSyncError(msg);
      return { ok:false, message:msg };
    }

    try {
      await postToWebhook(url, p, false);
      setSync(s=>({...s,[entry.id]:"ok"}));
      return { ok:true, message:"✅ Registrato su OneDrive!" };
    } catch(err) {
      console.error("Webhook error:", err);

      if (isNetworkLikeError(err)) {
        try {
          await postToWebhook(url, p, true);
          setSync(s=>({...s,[entry.id]:"compat"}));
          const msg = "📡 Inviato in modalita compatibilita. Verifica in Excel se la riga e arrivata.";
          setLastSyncError(msg);
          return { ok:true, message:msg };
        } catch (compatErr) {
          console.error("Webhook compatibility error:", compatErr);
        }
      }

      const msg = getErrorMessage(err, url);
      setSync(s=>({...s,[entry.id]:"error"}));
      setLastSyncError(msg);
      return { ok:false, message:`❌ ${msg}` };
    }
  }

  async function testWebhook() {
    const url = webhookDraft.trim();
    setTestingWebhook(true);
    setLastSyncError("");

    const sample = {
      giorno:getGiorno(todayKey()),
      data:toExcelDate(todayKey()),
      dipendente:nome || "Test Utente",
      commessa:sel || commesse[0] || "Test",
      ore:0,
      minuti:1,
      tempo:"00:01:00",
      descrizione:"TEST TimeTrack"
    };

    try {
      if (!url) throw new Error("Configura l'URL del flow nelle Impostazioni.");
      if (!isCompleteWebhookUrl(url)) throw new Error("L'URL del flow sembra incompleto.");
      await postToWebhook(url, sample, false);
      showToast("✅ Test webhook riuscito", 3000);
    } catch(err) {
      console.error("Test webhook error:", err);
      const msg = getErrorMessage(err, url);
      setLastSyncError(msg);
      showToast(`❌ ${msg}`, 5000);
    } finally {
      setTestingWebhook(false);
    }
  }

  const start = () => { if(active||!sel)return; setActive({commessa:sel,startTs:Date.now(),elapsed:0}); };

  const stop = async () => {
    if(!active)return;
    const entry={id:Date.now(),date:todayKey(),commessa:active.commessa,seconds:elapsed,desc:desc.trim()||"(nessuna descrizione)",nome};
    saveE([entry,...entries]);
    setActive(null);setDesc("");setTick(0);
    showToast("✓ Salvato! Invio a OneDrive...",3000);
    const result=await sendOD(entry);
    showToast(result.message, result.ok ? 3500 : 5000);
  };

  const retry = async entry => { showToast("🔄 Sincronizzazione...",3000); const result=await sendOD(entry); showToast(result.message, result.ok ? 3500 : 5000); };
  const delE = id => { saveE(entries.filter(e=>e.id!==id)); setSync(s=>{const n={...s};delete n[id];return n;}); };

  const exportCSV = () => {
    const rows=[["Giorno","Data","Dipendente","Commessa","Ore","Minuti","Tempo (hh:mm:ss)","Descrizione"]];
    [...entries].sort((a,b)=>a.date.localeCompare(b.date)).forEach(e=>{rows.push([getGiorno(e.date),toExcelDate(e.date),e.nome,e.commessa,Math.floor(e.seconds/3600),Math.floor((e.seconds%3600)/60),formatTime(e.seconds),e.desc]);});
    const csv=rows.map(r=>r.map(c=>`"${String(c).replace(/"/g,'""')}"`).join(";")).join("\n");
    const a=document.createElement("a"); a.href=URL.createObjectURL(new Blob(["\uFEFF"+csv],{type:"text/csv;charset=utf-8;"}));
    a.download=`timesheet_${nome.replace(/\s+/g,"_")}_${todayKey()}.csv`; a.click();
    showToast("📥 File scaricato!");
  };

  const grouped = entries.reduce((acc,e)=>{if(!acc[e.date])acc[e.date]=[];acc[e.date].push(e);return acc;},{});
  const isRunning = active&&active.startTs!==null;
  const pending = entries.filter(e=>sync[e.id]==="error").length;

  const SyncBadge = ({id}) => {
    const s=sync[id];
    if(!s||s==="ok") return <span style={{fontSize:13,color:C.accent}} title="Sincronizzato su OneDrive">☁</span>;
    if(s==="pending") return <span style={{fontSize:14,color:C.warn,display:"inline-block",animation:"spin 1s linear infinite"}}>↻</span>;
    if(s==="compat") return <span style={{fontSize:12,color:C.warn,fontWeight:700}} title="Invio in compatibilita: verifica Excel">? verifica</span>;
    const entry=entries.find(e=>e.id===id);
    return <span style={{fontSize:12,color:C.danger,cursor:"pointer",fontWeight:600}} onClick={()=>entry&&retry(entry)}>⚠ riprova</span>;
  };

  if(!ready) return null;
  if(!onboarded) return <Onboarding onDone={handleDone}/>;

  return (
    <div style={{minHeight:"100vh",fontFamily:"'DM Sans',sans-serif",color:C.white,display:"flex",flexDirection:"column",alignItems:"center"}}>
      <div style={{width:"100%",maxWidth:560,padding:"28px 20px 0"}}>

        {/* Header */}
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
          <div style={{display:"flex",alignItems:"center",gap:12}}>
            <div className="avatar" onClick={()=>setView("settings")} title="Impostazioni">
              {nome.split(" ").map(w=>w[0]).slice(0,2).join("").toUpperCase()}
            </div>
            <div>
              <div style={{fontSize:15,fontWeight:600}}>{nome}</div>
              <div style={{fontSize:11,color:C.muted}}>{todayLabel()}</div>
            </div>
          </div>
          <div style={{textAlign:"right"}}>
            <div style={{fontSize:12,color:C.muted}}>{entries.filter(e=>e.date===todayKey()).length} task oggi</div>
            <div className="cloud-ok">☁ OneDrive attivo</div>
          </div>
        </div>

        {pending>0 && <div className="sync-bar" onClick={()=>entries.filter(e=>sync[e.id]==="error").forEach(e=>retry(e))}>
          ⚠ {pending} registrazion{pending===1?"e":"i"} non sincronizzat{pending===1?"a":"e"} — clicca per riprovare
        </div>}

        {!!lastSyncError && <div className="card" style={{padding:"14px 16px",marginBottom:12,borderColor:"rgba(255,128,128,.35)",background:"rgba(255,128,128,.08)"}}>
          <div style={{fontSize:12,color:C.danger,fontWeight:700,marginBottom:6}}>Dettaglio sincronizzazione</div>
          <div style={{fontSize:13,color:"#ffd5d5",lineHeight:1.6}}>{lastSyncError}</div>
        </div>}

        {/* Nav */}
        <div className="card" style={{display:"flex",gap:4,padding:6,marginBottom:20}}>
          {[["track","⏱ Traccia"],["history","📋 Storico"],["settings","⚙ Impostazioni"]].map(([k,l])=>(
            <button key={k} className={`nav-btn${view===k?" active":""}`} onClick={()=>setView(k)} style={{flex:1,textAlign:"center"}}>{l}</button>
          ))}
        </div>

        {/* ── TRACK ── */}
        {view==="track" && <div style={{display:"flex",flexDirection:"column",gap:14}}>

          <div className="card" style={{padding:"32px 24px",textAlign:"center"}}>
            <div style={{display:"flex",alignItems:"center",justifyContent:"center",gap:10,marginBottom:6}}>
              {isRunning && <span className="pulse" style={{width:8,height:8,background:C.accent,borderRadius:"50%",display:"inline-block"}}/>}
              <span style={{fontSize:11,color:isRunning?C.accent:C.muted,fontWeight:600,letterSpacing:1,textTransform:"uppercase"}}>
                {isRunning?"In corso":"Fermo"}
              </span>
            </div>
            <div className="timer-display">{formatTime(elapsed)}</div>
            {active && <div style={{marginTop:8,fontSize:13,color:C.accent,fontWeight:500}}>📌 {active.commessa}</div>}
          </div>

          {!active && <div className="card" style={{padding:"20px"}}>
            <div className="label-sm">Commessa</div>
            {commesse.length===0
              ? <div style={{fontSize:13,color:C.muted}}>Nessuna commessa. <span style={{color:C.accent,cursor:"pointer"}} onClick={()=>setView("settings")}>Aggiungine una →</span></div>
              : <div style={{display:"flex",flexWrap:"wrap",gap:8}}>
                  {commesse.map(c=><button key={c} className={`commessa-chip${sel===c?" selected":""}`} onClick={()=>setSel(c)}>{c}</button>)}
                </div>
            }
          </div>}

          <div className="card" style={{padding:"20px"}}>
            <div className="label-sm">Cosa stai facendo?</div>
            <textarea rows={2} placeholder="es. Revisione offerta, riunione kickoff, installazione impianto..." value={desc} onChange={e=>setDesc(e.target.value)}/>
          </div>

          <div style={{display:"flex",gap:10}}>
            {!active
              ? <button className="btn-primary" style={{flex:1}} onClick={start} disabled={!sel}>▶ Avvia timer</button>
              : <button className="btn-stop" style={{flex:1}} onClick={stop}>■ Salva e invia a OneDrive</button>
            }
          </div>

          {grouped[todayKey()]&&grouped[todayKey()].length>0 && <div className="card" style={{padding:"20px"}}>
            <div className="label-sm">Oggi</div>
            {grouped[todayKey()].map(e=><div key={e.id} className="entry-row">
              <span className="badge">{e.commessa}</span>
              <span style={{fontSize:13,fontFamily:"DM Mono",color:C.accent,minWidth:64}}>{formatTime(e.seconds)}</span>
              <span style={{fontSize:13,color:C.muted3,flex:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{e.desc}</span>
              <SyncBadge id={e.id}/>
              <button className="delete-btn" onClick={()=>delE(e.id)}>×</button>
            </div>)}
            <div style={{marginTop:10,paddingTop:10,borderTop:"1px solid rgba(255,255,255,.06)",fontSize:13,color:C.muted}}>
              Totale oggi: <span style={{color:C.accent,fontFamily:"DM Mono",fontWeight:600}}>{formatTime(grouped[todayKey()].reduce((s,e)=>s+e.seconds,0))}</span>
            </div>
          </div>}
        </div>}

        {/* ── HISTORY ── */}
        {view==="history" && <div style={{display:"flex",flexDirection:"column",gap:14}}>
          <button className="btn-primary" onClick={exportCSV} style={{width:"100%"}}>📥 Esporta backup CSV</button>
          {Object.keys(grouped).sort((a,b)=>b.localeCompare(a)).map(date=>{
            const de=grouped[date],tot=de.reduce((s,e)=>s+e.seconds,0);
            const lbl=new Date(date).toLocaleDateString("it-IT",{weekday:"long",day:"numeric",month:"long"});
            return <div key={date} className="card" style={{padding:"20px"}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
                <div style={{fontSize:13,fontWeight:600,color:C.accent,textTransform:"capitalize"}}>{lbl}</div>
                <div style={{fontSize:12,fontFamily:"DM Mono",color:C.accent}}>{formatTime(tot)}</div>
              </div>
              {de.map(e=><div key={e.id} className="entry-row">
                <span className="badge">{e.commessa}</span>
                <span style={{fontSize:13,fontFamily:"DM Mono",color:C.accent,minWidth:64}}>{formatTime(e.seconds)}</span>
                <span style={{fontSize:13,color:C.muted3,flex:1}}>{e.desc}</span>
                <SyncBadge id={e.id}/>
                <button className="delete-btn" onClick={()=>delE(e.id)}>×</button>
              </div>)}
            </div>;
          })}
          {entries.length===0 && <div style={{textAlign:"center",color:C.muted2,padding:"40px 0",fontSize:14}}>Nessuna registrazione ancora. 📭</div>}
        </div>}

        {/* ── SETTINGS ── */}
        {view==="settings" && <div style={{display:"flex",flexDirection:"column",gap:14}}>
          <div className="card" style={{padding:"24px"}}>
            <div className="label-sm">Il tuo nome</div>
            <div style={{display:"flex",alignItems:"center",gap:10}}>
              <div className="avatar" style={{cursor:"default"}}>{nome.split(" ").map(w=>w[0]).slice(0,2).join("").toUpperCase()}</div>
              <input type="text"
                value={editN?editNVal:nome}
                onFocus={()=>{setEditN(true);setEditNVal(nome);}}
                onChange={e=>setEditNVal(e.target.value)}
                onBlur={()=>{const v=editNVal.trim();if(v){setNome(v);storage.set("tt-nome",v);showToast("✓ Nome aggiornato!");}setEditN(false);}}
                onKeyDown={e=>{if(e.key==="Enter")e.target.blur();}}
              />
            </div>
          </div>

          <div className="card" style={{padding:"24px"}}>
            <div className="label-sm">Commesse attive</div>
            {commesse.length===0 && <div style={{fontSize:13,color:C.muted2,marginBottom:16}}>Nessuna commessa ancora.</div>}
            {commesse.map(c=><div key={c} style={{display:"flex",alignItems:"center",gap:12,padding:"10px 0",borderBottom:"1px solid rgba(255,255,255,.06)"}}>
              <span style={{flex:1,fontSize:14,color:C.white}}>📌 {c}</span>
              <button className="delete-btn" onClick={()=>{if(commesse.length<=1)return showToast("⚠ Serve almeno una commessa");saveC(commesse.filter(x=>x!==c));showToast("Commessa rimossa");}}>×</button>
            </div>)}
            <div style={{display:"flex",gap:10,marginTop:16}}>
              <input type="text" placeholder="Aggiungi nuova commessa..." value={newC} onChange={e=>setNewC(e.target.value)}
                onKeyDown={e=>{if(e.key==="Enter"&&newC.trim()){if(commesse.includes(newC.trim()))return showToast("⚠ Già presente");saveC([...commesse,newC.trim()]);setNewC("");showToast("✓ Aggiunta!");}}}
              />
              <button className="btn-primary" style={{padding:"10px 18px",fontSize:20,borderRadius:12}} onClick={()=>{if(!newC.trim())return;if(commesse.includes(newC.trim()))return showToast("⚠ Già presente");saveC([...commesse,newC.trim()]);setNewC("");showToast("✓ Aggiunta!");}}>+</button>
            </div>
          </div>

          <div className="card" style={{padding:"24px"}}>
            <div className="label-sm">Webhook Power Automate</div>
            <input type="text" value={webhookDraft} placeholder={WEBHOOK_PLACEHOLDER} onChange={e=>setWebhookDraft(e.target.value)} />
            <div style={{display:"flex",gap:10,marginTop:14,flexWrap:"wrap"}}>
              <button className="btn-primary" style={{padding:"10px 18px"}} onClick={saveWebhook}>Salva URL</button>
              <button onClick={testWebhook} disabled={testingWebhook} style={{background:"rgba(114,255,234,.15)",border:"1px solid rgba(114,255,234,.28)",borderRadius:12,color:C.accent,cursor:testingWebhook?"default":"pointer",padding:"10px 18px",fontSize:14,fontFamily:"inherit",opacity:testingWebhook ? 0.6 : 1}}>
                {testingWebhook?"Test in corso...":"Test webhook"}
              </button>
              <button onClick={resetWebhook} style={{background:"none",border:"1px solid rgba(255,255,255,.14)",borderRadius:12,color:C.muted3,cursor:"pointer",padding:"10px 18px",fontSize:14,fontFamily:"inherit"}}>Ripristina</button>
            </div>
            <div style={{marginTop:12,fontSize:12,lineHeight:1.7,color:C.muted}}>
              Incolla qui l'HTTP POST URL completo del trigger <b>Alla ricezione di una richiesta HTTP</b>.
              Il test prova una POST reale. Se fallisce con errore di rete/CORS, controlla browser e flow.
            </div>
            <div style={{marginTop:10,fontSize:12,color:isCompleteWebhookUrl(webhookDraft)?C.accent:C.warn}}>
              {isCompleteWebhookUrl(webhookDraft)?"✓ URL flow completo":"⚠ URL probabilmente incompleto"}
            </div>
          </div>

          <div className="card" style={{padding:"18px 20px",fontSize:12,color:C.muted,lineHeight:1.9}}>
            <span style={{color:C.accent,fontWeight:600}}>☁ OneDrive attivo</span><br/>
            Ogni registrazione viene inviata automaticamente al file Excel aziendale.<br/>
            Il backup CSV locale è sempre disponibile dallo Storico. 📋
          </div>
        </div>}

        <div style={{height:60}}/>
      </div>
      {toast && <div className="toast">{toast}</div>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
